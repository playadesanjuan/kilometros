<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1976D2">
 <link rel="manifest" href="manifest.json">
 <link rel="apple-touch-icon" href="icon-192.png">
  <title>Registro de cargas coche</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 10px;
      background-color: #f2f2f2;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 5px;
    }
    .mensaje {
      margin-top: 20px;
      color: green;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Registro de Cargas</h2>
  <form id="cargas-form">
    <label>Carga kw:</label>
    <input id="carga_kw" name="carga_kw" type="number" step="0.01" required>

    <label>Precio total:</label>
    <input id="precio_total" name="precio_total" type="number" step="0.01" required>

    <label>Empresa recarga total:</label>
    <input type="text" name="empresa_recarga" required>

    <div class="resultado">

    <span>Precio medio</span>

    <strong id="precio_kwh">--</strong>

    </div>

    <button id="btnGuardar" type="submit">
    Guardar carga
    </button>

  <script>
    const form = document.getElementById('cargas-form');
    const mensaje = document.getElementById('mensaje');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const datos = new FormData(form);

      fetch('https://script.google.com/macros/s/AKfycbzp_2bfW2kT9GjOqrx3XYtieyGUXoi9FzP-We8NEdJnEs1KkToKtThmpKCxp6-xXb1T/exec', {
        method: 'POST',
        body: datos
      })
      .then(res => res.text())
      .then(data => {
        mensaje.textContent = "✅ Carga guardada correctamente";
        form.reset();
      })
      .catch(error => {
        mensaje.textContent = "❌ Error al guardar: " + error.message;
      });
    });
  </script>
  <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker registrado"))
    .catch(err => console.log(err));
}
</script>

<script src="js/config.js"></script>
<script src="js/calculos.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
    
</body>
</html>
