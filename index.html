<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1976D2">
 <link rel="manifest" href="manifest.json">
 <link rel="apple-touch-icon" href="icon-192.png">
  <title>Registro de cargas coche</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 10px;
      background-color: #f2f2f2;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 5px;
    }
    .mensaje {
      margin-top: 20px;
      color: green;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<header>

    <h1>⚡ Cargas VE</h1>

    <p>Registro inteligente de recargas</p>

</header>

<div class="container">

    <!-- INICIO -->

    <section id="pantallaInicio" class="pantalla activa">

        <div class="card">

            <h2>Nueva carga</h2>

            <form id="cargas-form">

                <label>Energía (kWh)</label>

                <input id="carga_kw"
                       name="carga_kw"
                       type="number"
                       step="0.01"
                       required>

                <label>Precio (€)</label>

                <input id="precio_total"
                       name="precio_total"
                       type="number"
                       step="0.01"
                       required>

                <label>Empresa</label>

                <select
                    id="empresa_recarga"
                    name="empresa_recarga">

                    <option>Iberdrola</option>
                    <option>Zunder</option>
                    <option>Tesla</option>
                    <option>Ionity</option>
                    <option>Endesa</option>
                    <option>Repsol</option>
                    <option>Wenea</option>

                </select>

                <div class="resultado">

                    <span>Precio por kWh</span>

                    <strong id="precio_kwh">--</strong>

                </div>

                <button
                    id="btnGuardar"
                    type="submit">

                    Guardar carga

                </button>

            </form>

            <div id="mensaje" class="mensaje"></div>

        </div>

    </section>


    <!-- HISTORIAL -->

<section id="pantallaHistorial" class="pantalla">

    <div class="card">

        <h2>Historial de cargas</h2>

        <div id="historial" class="historial"></div>

    </div>

</section>

    <!-- ESTADISTICAS -->

    <section id="pantallaEstadisticas" class="pantalla">

        <div class="card">

            <h2>Estadísticas</h2>

            <div id="estadisticas">

                Próximamente...

            </div>

        </div>

    </section>


    <!-- PLANIFICADOR -->

    <section id="pantallaPVPC" class="pantalla">

        <div class="card">

            <h2>Planificador</h2>

            <div>

                Próximamente...

            </div>

        </div>

    </section>


</div>

<nav>

    <a id="menuInicio" class="active">🏠<br>Inicio</a>

    <a id="menuHistorial">📜<br>Historial</a>

    <a id="menuEstadisticas">📊<br>Estadísticas</a>

    <a id="menuPVPC">⚡<br>PVPC</a>

</nav>

<script src="js/config.js"></script>
<script src="js/calculos.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navegacion.js"></script>
<script src="js/app.js"></script>
    
</body>
</html>
